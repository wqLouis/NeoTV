name: Build APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bun dependencies
        run: bun install

      - name: Initialize Android project
        run: |
          rm -rf src-tauri/gen/android
          bunx tauri android init --ci

      - name: Build frontend
        run: bun run build

      - name: Build Android APK (aarch64)
        run: bunx tauri android build --target aarch64

      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > release-key.jks
          unzip -o src-tauri/gen/android/app/build/outputs/apk/aarch64/release/*.apk -d unsigned-apk
          zipalign -f 4 unsigned-apk/app-unaligned.apk app-aligned.apk
          $ANDROID_SDK/build-tools/34.0.0/apksigner sign \
            --ks release-key.jks \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out NeoTV-signed.apk \
            unsigned-apk/app-unaligned.apk || true
          mv NeoTV-signed.apk src-tauri/gen/android/app/build/outputs/apk/aarch64/release/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTV-aarch64
          path: src-tauri/gen/android/app/build/outputs/apk/aarch64/release/*.apk
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: NeoTV-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.apk'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
